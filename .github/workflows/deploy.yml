name: Deploy to VPS

on:
  push:
    branches:
      - main # Hangi branch'e push yapıldığında çalışacağını buradan belirlersiniz.

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: Execute remote ssh commands to deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          # 1. Proje dizinine git (VPS'inizdeki projenizin bulunduğu klasör)
          # Lütfen bu yolu kendi sunucunuzdaki yolla değiştirin!
          cd /path/to/your/project/sd-backend
          
          # 2. GitHub'dan en güncel kodları çek
          git pull origin main
          
          # 3. Yeni Docker imajını oluştur
          docker build -t sd-backend:latest .
          
          # 4. Eski çalışan konteyneri durdur ve sil (varsa)
          docker stop backend-api || true
          docker rm backend-api || true
          
          # 5. Yeni konteyneri ayağa kaldır
          docker run -d -p 80:8080 --name backend-api -e SPRING_PROFILES_ACTIVE=prod sd-backend:latest
          
          # İsteğe bağlı: Kullanılmayan eski Docker imajlarını temizle (sunucuda yer kaplamaması için)
          docker image prune -f

spring.application.name=sd-backend

# Server Configuration
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/sd_app}
spring.data.mongodb.database=${MONGODB_DATABASE:sd_app}

# JWT Configuration
# WARNING: Must be at least 32 bytes (256 bits). Set via JWT_SECRET env var.
jwt.secret=${JWT_SECRET:your-secret-key-at-least-32-chars-long}
jwt.expiration=604800000

# CORS Configuration
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# Logging
logging.level.root=INFO
logging.level.com.sd.backend=INFO
logging.level.com.sd.backend.config.RequestLoggingFilter=INFO
logging.level.org.springframework=WARN
logging.level.org.mongodb.driver=WARN
logging.level.org.springframework.data.mongodb=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Google Sign-In
# Set via GOOGLE_CLIENT_ID env var
google.client.id=${GOOGLE_CLIENT_ID:your-google-client-id}

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.example.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:user@example.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Mail timeouts (avoid hanging requests when SMTP is down/misconfigured)
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT_MS:5000}

# If you use port 465, set MAIL_SSL_ENABLE=true and MAIL_STARTTLS_ENABLE=false
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:true}

# Support
support.email.to=${SUPPORT_EMAIL:destek@nxsapps.com}

# APNs Configuration
apns.key-id=${APNS_KEY_ID:PLACEHOLDER_KEY_ID}
apns.team-id=${APNS_TEAM_ID:PLACEHOLDER_TEAM_ID}
apns.bundle-id=${APNS_BUNDLE_ID:com.example.app}
apns.key-file=${APNS_KEY_FILE:apns_key.p8}
apns.sandbox=${APNS_SANDBOX:false}

# Scheduler Configuration
app.scheduler.timezone=${APP_SCHEDULER_TIMEZONE:Europe/Istanbul}
app.scheduler.daily-engagement.cron=${APP_SCHEDULER_DAILY_CRON:0 30 12 * * ?}
app.scheduler.subscription-reminder.cron=${APP_SCHEDULER_REMINDER_CRON:0 0 0 * * ?}

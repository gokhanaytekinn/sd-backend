spring.application.name=sd-backend

# Server Configuration
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017}
spring.data.mongodb.database=${MONGODB_DATABASE:sd_backend}

# JWT Configuration
# WARNING: Change this secret in production! Must be at least 32 bytes (256 bits)
jwt.secret=your-secret-key-must-be-at-least-32-characters-long-change-in-production
jwt.expiration=604800000

# CORS Configuration
cors.allowed.origins=http://localhost:3000

# Logging
logging.level.root=INFO
logging.level.com.sd.backend=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://gokhan746_db_user:KEg47sj251EwRyR4@kokyel-cluster.unrdold.mongodb.net/?appName=kokyel-cluster}
spring.data.mongodb.database=${MONGODB_DATABASE:sd_app}

# JWT Configuration

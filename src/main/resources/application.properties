spring.application.name=sd-backend

# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/sd_backend
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# WARNING: Change this secret in production! Must be at least 32 bytes (256 bits)
jwt.secret=your-secret-key-must-be-at-least-32-characters-long-change-in-production
jwt.expiration=604800000

# CORS Configuration
cors.allowed.origins=http://localhost:3000

# Logging
logging.level.root=INFO
logging.level.com.sd.backend=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
